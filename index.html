<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Desafio FrontEnd - TodoList</title>
    <style>
        /* ==========================================================================
           🎨 ESTILOS (CSS) - IGUAL AO THUMBNAIL.PNG
           ========================================================================== */
        * {
            margin: 0px;
            padding: 0px;
            text-decoration: none;
            font-family: "Arial", sans-serif;
            color: #282828;
            box-sizing: border-box;
            list-style-type: none;
        }

        body {
            background: #EEE;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        body main {
            background: blue;
            color: blue;
            font-size: 13px;
        }

        @keyframes fadeDown {
            0% { transform: translateY(-100%); opacity: 0; }
            100% { transform: translateY(-100%); opacity: 0; }
        }

        #app {
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 600px;
            height: 750px;
            background: white;
            box-shadow: 0px 10px 26px rgba(0, 0, 0, 0.15);
        }

        .tabs {
            padding: 20px 20px 0px 20px;
            margin-bottom: 5px;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 10;
            display: flex;
            background: #fff;
        }

        .tabs > li {
            flex: 1 1 50%;
        }

        .tabs > li a {
            width: 100%;
            display: block;
            text-align: center;
            font-weight: bold;
            padding: 10px;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        #conteudoTab {
            position: relative;
            height: calc(100% - 65px);
        }

        #conteudoTab ul {
            padding: 10px 20px;
        }

        #conteudoTab ul:hover li {
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        #conteudoTab ul:hover li:hover {
            opacity: 1;
        }

        #conteudoTab li {
            padding: 15px 10px;
            border-radius: 4px;
            margin-bottom: 5px;
            transition: background 0.2s;
        }

        #conteudoTab li:nth-child(even) {
            background: #ebf3fd;
        }

        #conteudoTab li label {
            cursor: pointer;
            display: flex;
            align-items: center;
            width: 100%;
        }

        #conteudoTab li label p {
            flex: 1;
            font-size: 15px;
            word-break: break-all;
        }

        #conteudoTab li label input {
            width: 16px;
            height: 16px;
            margin-right: 15px;
            cursor: pointer;
        }

        #conteudoTab li label a {
            opacity: 0;
            font-size: 16px;
            margin-left: 10px;
            transition: opacity 0.2s ease;
        }

        #conteudoTab li label:hover a {
            opacity: 1;
        }

        button {
            border: none;
            background: #03A9F4;
            color: white;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0px 2px 7px rgba(3, 169, 244, 0.3);
            border-radius: 4px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        button:focus, button:hover {
            background: #148ec5;
        }

        #form {
            position: absolute;
            bottom: 0px;
            left: 0px;
            right: 0px;
            background: white;
            padding: 20px;
            border-top: 1px solid #eee;
        }

        #formAdicionarTarefa {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            position: relative;
            padding-bottom: 20px; 
        }

        #formAdicionarTarefa button {
            flex: 0 0 110px;
            height: 75px;
        }

        #formAdicionarTarefa textarea {
            flex: 1;
            font-size: 16px;
            padding: 10px;
            height: 75px;
            max-height: 75px;
            min-height: 75px;
            border: 1px solid #ddd;
            border-radius: 4px;
            resize: none;
            background: #fdfdfd;
        }

        #formAdicionarTarefa textarea:focus {
            border-color: #03a9f4;
            outline: none;
            background: #fff;
        }

        #formAdicionarTarefa #contador {
            position: absolute;
            right: 125px;
            bottom: 0px;
            font-weight: bold;
            font-size: 14px;
            color: #282828;
        }

        #naoFeitas, #feitas {
            background: white;
            position: absolute;
            left: 0px;
            top: 0px;
            right: 0px;
            bottom: 0px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        #naoFeitas ul, #feitas ul {
            overflow-y: auto;
            position: absolute;
            top: 0px;
            left: 0px;
            right: 0px;
            bottom: 140px; 
        }

        #naoFeitas { transform: translateX(-20px); }
        #feitas { transform: translateX(20px); }
        #feitas ul { bottom: 0px; }

        .tabs li a {
            opacity: 0.3;
            position: relative;
            padding-bottom: 15px;
        }

        .tabs li a::before {
            content: "";
            display: block;
            position: absolute;
            bottom: -4px;
            left: 0px;
            height: 4px;
            background: #03A9F4;
            width: 100%;
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .tabs li.active a { color: #282828; opacity: 1; }
        .tabs li.active a::before { transform: scaleX(1); }

        #feitas.active, #naoFeitas.active {
            opacity: 1;
            visibility: visible;
            transform: translateX(0px);
        }

        #erro {
            position: absolute;
            left: 0px;
            bottom: 0px;
            color: #e00000;
            font-size: 13px;
            display: none;
        }

        .btn-disable {
            cursor: default !important;
            pointer-events: none;
            color: #c0c0c0 !important;
            background-color: #ffffff !important;
            border: 1px solid #c0c0c0 !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>

    <div id="app">
        <nav>
            <ul class="tabs">
                <li class="active" id="N"><a href="#" data-tabindex="0" title="NÃO FEITAS" onclick="abas(0); return false;">NÃO FEITAS</a></li>
                <li id="F"><a href="#" data-tabindex="1" title="FEITAS" onclick="abas(1); return false;">FEITAS</a></li>
            </ul>
        </nav>
        
        <div id="conteudoTab">
            <section id="naoFeitas" class="active">
                <ul id="naoF"></ul>
                <div id="form">
                    <form id="formAdicionarTarefa" action="#" method="get" accept-charset="utf-8" onSubmit="return false">
                        <textarea name="descricao" placeholder="Insira uma tarefa" oninput="contador();" onkeydown="contador();"></textarea>
                        <button type="submit" class="btn-disable" id="enviar" onclick="addTarefa();">Adicionar</button>
                        <span id="erro">Chegou no limite amiguinho!</span>
                        <span id="contador">140</span>
                    </form>
                </div>
            </section>
            
            <section id="feitas">
                <ul id="f"></ul>
            </section>
        </div>
    </div>

    <script>
        // Alternar entre abas "Não Feitas" e "Feitas"
        function abas(aba) {
            if (aba == 0) {
                document.getElementById("F").className = "";
                document.getElementById("N").className = "active";
                document.getElementById("feitas").className = "";
                document.getElementById("naoFeitas").className = "active";
            } else {
                document.getElementById("F").className = "active";
                document.getElementById("N").className = "";
                document.getElementById("naoFeitas").className = "";
                document.getElementById("feitas").className = "active";
            }
        }

        // Controlar limite de caracteres e botão de envio
        function contador() {
            var limite = 140;
            var campoTextarea = document.getElementsByName("descricao")[0];
            var caracteresDigitados = campoTextarea.value;
            var reduzir = caracteresDigitados.length;
            
            if (reduzir >= 1) {
                document.getElementById("enviar").className = "";
            } else {
                document.getElementById("enviar").className = "btn-disable";
            }
            
            if (reduzir >= limite) {
                document.getElementById("erro").style.display = "block";
                campoTextarea.value = caracteresDigitados.substring(0, limite);
                document.getElementById("contador").innerHTML = "0";
            } else {
                var caracteresRestantes = limite - reduzir;
                document.getElementById("contador").innerHTML = caracteresRestantes;
                document.getElementById("erro").style.display = "none";
            }
        }

        // Remover elemento da lista de forma limpa
        function deletarTarefa(x) {
            var node = document.getElementById(x);
            if (node && node.parentNode) {
                node.parentNode.removeChild(node);
            }
        }

        // Gerador de identificadores exclusivos para evitar bugs
        function proximoN() {
            return Math.floor(Math.random() * 10000) + Date.now();
        }

        // Adicionar nova tarefa pendente
        function addTarefa(data) {
            var campoTextarea = document.getElementsByName("descricao")[0];
            var Texto = (data != null && data !== undefined) ? data : campoTextarea.value;
            
            if (Texto.trim() === "") return;

            var i = proximoN();
            var node = document.createElement("LI");
            node.setAttribute("id", "n" + i);
            
            var node2 = document.createElement("LABEL");
            var input = document.createElement("input");
            input.type = "checkbox";
            input.setAttribute("onclick", "tarefaFeita('n" + i + "')");
            node2.appendChild(input);
            
            var node3 = document.createElement("P");
            var textnode = document.createTextNode(Texto);
            node3.appendChild(textnode);
            
            var node4 = document.createElement("A");
            node4.setAttribute("href", "#");
            node4.setAttribute("onclick", "deletarTarefa('n" + i + "'); return false;");
            var textnode4 = document.createTextNode("❌");
            node4.appendChild(textnode4);
            
            node2.appendChild(node3);
            node2.appendChild(node4);
            node.appendChild(node2);
            document.getElementById("naoF").appendChild(node);
            
            if (!data) {
                campoTextarea.value = "";
                contador();
            }
        }

        // Concluir tarefa (Move para "Feitas")
        function tarefaFeita(x) {
            var itemOriginal = document.getElementById(x);
            if (!itemOriginal) return;

            var textoTarefa = itemOriginal.getElementsByTagName("p")[0].textContent;
            var i = proximoN();
            
            var node = document.createElement("LI");
            node.setAttribute("id", "f" + i);
            
            var node2 = document.createElement("LABEL");
            var input = document.createElement("input");
            input.type = "checkbox";
            input.setAttribute("onclick", "tarefaDesFeita('f" + i + "')");
            input.setAttribute("checked", "checked");
            node2.appendChild(input);
            
            var node3 = document.createElement("P");
            var textnode = document.createTextNode(textoTarefa);
            node3.appendChild(textnode);
            
            var node4 = document.createElement("A");
            node4.setAttribute("href", "#");
            node4.setAttribute("onclick", "deletarTarefa('f" + i + "'); return false;");
            var textnode4 = document.createTextNode("❌");
            node4.appendChild(textnode4);
            
            node2.appendChild(node3);
            node2.appendChild(node4);
            node.appendChild(node2);
            document.getElementById("f").appendChild(node);
            
            deletarTarefa(x);
        }

        // Desmarcar tarefa (Retorna para "Não Feitas")
        function tarefaDesFeita(x) {
            var itemOriginal = document.getElementById(x);
            if (!itemOriginal) return;

            var textoTarefa = itemOriginal.getElementsByTagName("p")[0].textContent;
            addTarefa(textoTarefa);
            deletarTarefa(x);
        }

        // Função para carregar objetos estruturados
        function myFunction(arr) {
            for (var i = 0; i < arr.tarefas.length; i++) {
                var descricao = arr.tarefas[i].descricao;
                var feito = arr.tarefas[i].feito;
                
                if (feito == 0) {
                    addTarefa(descricao);
                } else {
                    var idNovo = proximoN();
                    var htmlFeito = '<li id="f'+idNovo+'"><label><input type="checkbox" onclick="tarefaDesFeita(\'f'+idNovo+'\')" checked><p>'+descricao+'</p><a href="#" onclick="deletarTarefa(\'f'+idNovo+'\'); return false;">❌</a></label></li>';
                    document.getElementById('f').innerHTML += htmlFeito;
                }
            }
        }

        // Renderiza automaticamente a tarefa 'ugyugug' na inicialização (conforme imagem)
        window.onload = function() {
            myFunction({
                tarefas: [
                    { id: 1, descricao: "ugyugug", feito: 0 }
                ]
            });
        };
    </script>
</body>
</html>
